  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      background: #f0f4f8;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;

    }

    header {
      width: 100%; max-width: 480px;

    }
    .header-title h1 { font-size: 26px; font-weight: 700; color: #1a73e8; }

    /* ââ Queue Badge ââââââââââââââââââââââââââââââââââââââââââââââââââââ */
    #queue-badge {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #ff6d00; color: #fff;
      border-radius: 12px; padding: 6px 12px;
      font-size: 11px; font-weight: 700; line-height: 1.3;
      min-width: 60px; text-align: center;
      box-shadow: 0 2px 8px rgba(255,109,0,0.35);
      animation: fadeIn 0.3s ease;
    }
    #queue-badge.visible { display: flex; }
    #queue-badge .q-count { font-size: 20px; font-weight: 900; line-height: 1; }
    #queue-badge .q-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }

    /* ââ Sync indicator ââââââââââââââââââââââââââââââââââââââââââââââââââ */
    #sync-indicator {
      display: none;
      width: 100%; max-width: 480px;
      background: #fff3e0; border: 1px solid #ffb74d;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: #e65100;
      margin-bottom: 12px;
      align-items: center; gap: 8px;
    }
    #sync-indicator.visible { display: flex; }
    #sync-indicator .sync-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ff6d00;
      animation: pulse 1.2s infinite; flex-shrink: 0;
    }
    #sync-now-btn {
      margin-left: auto; flex-shrink: 0;
      background: #ff6d00; color: #fff;
      border: none; border-radius: 8px; padding: 5px 10px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap;
    }
    #sync-now-btn:active { opacity: 0.75; }

    /* ââ Notes card âââââââââââââââââââââââââââââââââââââââââââââââââââââ */
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px 20px; width: 100%; max-width: 480px; margin-bottom: 20px;
    }
    .card label {
      display: block; font-size: 12px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .card textarea {
      width: 100%; border: 1px solid #ddd; border-radius: 10px;
      padding: 12px; font-size: 15px; resize: vertical; min-height: 80px;
      outline: none; transition: border-color 0.2s; font-family: inherit; color: #333;
    }
    .card textarea:focus { border-color: #1a73e8; }

    /* ââ GPS + buttons ââââââââââââââââââââââââââââââââââââââââââââââââââ */
    .gps-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .gps-dot {
      width: 12px; height: 12px; border-radius: 50%; background: #ccc; flex-shrink: 0;
    }
    .gps-dot.active  { background: #34a853; }
    .gps-dot.pending { background: #fbbc04; animation: pulse 1s infinite; }
    .gps-dot.error   { background: #ea4335; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    .gps-text { font-size: 13px; color: #666; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 4px; }
    .btn {
      border: none; border-radius: 12px; padding: 16px 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn .icon  { font-size: 22px; line-height: 1; }
    .btn .label { font-size: 12px; }
    .btn-interested { background: linear-gradient(135deg, #34a853, #1e7e34); }
    .btn-maybe      { background: linear-gradient(135deg, #fbbc04, #e0a800); color: #333; }
    .btn-not        { background: linear-gradient(135deg, #ea4335, #c62828); }

    /* ââ Status bar âââââââââââââââââââââââââââââââââââââââââââââââââââââ */
    #status-bar {
      width: 100%; max-width: 480px; min-height: 44px; border-radius: 12px;
      padding: 10px 16px; font-size: 14px;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.3s, color 0.3s;
    }
    #status-bar.idle    { background: #e8f0fe; color: #1a73e8; }
    #status-bar.loading { background: #fff8e1; color: #f57c00; }
    #status-bar.success { background: #e6f4ea; color: #1e7e34; }
    #status-bar.queued  { background: #fff3e0; color: #e65100; }
    #status-bar.error   { background: #fce8e6; color: #c62828; }

    /* ââ History ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
    .history-card { width: 100%; max-width: 480px; margin-top: 20px; }
    .history-card h2 {
      font-size: 14px; font-weight: 700; color: #444;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }
    .history-list { list-style: none; }
    .history-list li {
      background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex; justify-content: space-between; align-items: center; font-size: 14px;
      gap: 8px;
    }
    .h-addr { font-weight: 600; color: #333; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-meta { font-size: 11px; color: #999; white-space: nowrap; }
    .badge { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-interested { background: #e6f4ea; color: #1e7e34; }
    .badge-maybe      { background: #fff8e1; color: #e0a800; }
    .badge-not        { background: #fce8e6; color: #c62828; }
    .badge-queued     { background: #fff3e0; color: #e65100; }
    .empty-state { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }
  </style>

<body>

  <header>
    <div class="header-title">
      <h1>CrispNW</h1>
      <p>Field Canvas â v10.0 (Iframe Engine)</p>
    </div>
    <!-- Queue badge: shows count of leads waiting for signal -->
    <div id="queue-badge">
      <span class="q-count" id="queue-count">0</span>

  <!-- Sync indicator: visible when there are queued leads -->
  <div id="sync-indicator">

  <div id="status-bar" class="idle">

  <div class="history-card">

    <ul class="history-list" id="history-list">

  <script>
    // âââ CONFIG ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // V10: Iframe Engine â hidden <form> POST bypasses fetch() and all CORS/redirect
    // restrictions. Backend reads payload via e.parameter.data (form field "data").
    var BACKEND_URL   = 'https://script.google.com/macros/s/AKfycbzwyXuhH133aqQMWf4J7CJOTlwlYN-iTgHmbbQWL1TCYCjoTVVdi__xpea36Xi2X38v/exec';
    var QUEUE_KEY     = 'crispnw_pendingLeads';   // localStorage key
    var SYNC_INTERVAL = 60 * 1000;                // 60 seconds

    // âââ STATE âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    var currentLat = null;
    var currentLng = null;

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // GPS
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    function initGPS() {
      if (!navigator.geolocation) { setGPS('error', 'GPS not supported.'); return; }
      navigator.geolocation.watchPosition(
        function(pos) {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          setGPS('active', 'GPS locked \u00b1' + Math.round(pos.coords.accuracy) + 'm');
          enableButtons(true);
          setStatus('idle', 'ð Ready â tap a status button to log this address.');
        },
        function(err) {
          setGPS('error', 'GPS error: ' + err.message);
          enableButtons(false);
          setStatus('error', 'â ï¸ Cannot get location. Check permissions.');
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    }

    function setGPS(state, text) {
      document.getElementById('gps-dot').className = 'gps-dot ' + state;
      document.getElementById('gps-text').textContent = text;
    }

    function enableButtons(on) {
      ['btn-interested','btn-maybe','btn-not'].forEach(function(id) {
        document.getElementById(id).disabled = !on;
      });
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // QUEUE HELPERS  (localStorage-backed offline queue)
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    function getQueue() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
      catch (e) { return []; }
    }

    function saveQueue(q) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    }

    function enqueue(payload) {
      var q = getQueue();
      q.push(payload);
      saveQueue(q);
      console.log('[CrispNW] Queued lead. Queue size:', q.length);
    }

    function dequeue(index) {
      var q = getQueue();
      q.splice(index, 1);
      saveQueue(q);
    }

    function updateQueueUI() {
      var q     = getQueue();
      var count = q.length;
      var badge = document.getElementById('queue-badge');
      var sync  = document.getElementById('sync-indicator');

      document.getElementById('queue-count').textContent = count;
      badge.classList.toggle('visible', count > 0);
      sync.classList.toggle('visible',  count > 0);

      if (count > 0) {
        document.getElementById('sync-msg').textContent =
          count + ' lead' + (count > 1 ? 's' : '') +
          ' queued â waiting for signal to syncâ¦';
      }
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // TRANSPORT â sendDataForm(payload)
    //   V10: Iframe Engine â bypasses fetch() entirely.
    //   A hidden <form> POSTs to the backend via a hidden <iframe> target.
    //   Form submissions are NOT subject to CORS, no-cors restrictions, or
    //   302-redirect body stripping on any browser or mobile network.
    //   Blind-success: form.submit() fires and we resolve after 1.5s.
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    function sendDataForm(payload) {
      return new Promise(function(resolve, reject) {
        if (!navigator.onLine) return reject(new Error('Offline'));

        var iframeName = 'hidden_iframe_' + Date.now();
        var iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        var form = document.createElement('form');
        form.method = 'POST';
        form.action = BACKEND_URL;
        form.target = iframeName;

        var input = document.createElement('input');
        input.type  = 'hidden';
        input.name  = 'data';
        input.value = JSON.stringify(payload);
        form.appendChild(input);
        document.body.appendChild(form);

        form.submit();

        // Blind success â form is fire-and-forget; resolve after iframe settles
        setTimeout(function() {
          iframe.remove();
          form.remove();
          resolve();
        }, 1500);
      });
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // SUBMIT LEAD  (Antigravity offline-first)
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    async function submitLead(status) {
      if (currentLat === null) {
        setStatus('error', 'â ï¸ No GPS fix yet. Please wait.');
        return;
      }

      enableButtons(false);
      setStatus('loading', 'â³ Logging leadâ¦');

      var payload = {
        timestamp : new Date().toISOString(),
        lat       : currentLat,
        lng       : currentLng,
        status    : status,
        notes     : document.getElementById('notes').value.trim()
      };

      // ââ Attempt live submission via iframe form engine âââââââââââââââââââ
      try {
        await sendDataForm(payload);

        // Blind success â form submitted without throw = data is on its way.
        console.log('[CrispNW] Lead sent via iframe engine (v10):', payload.status, payload.lat, payload.lng);
        setStatus('success', '\u2705 "' + status + '" logged! Check your Sheet.');
        addToHistory(status, payload, false);
        document.getElementById('notes').value = '';

      } catch (err) {
        // ââ Network fail (navigator.onLine === false) â push to offline queue
        console.warn('[CrispNW] Offline, queuing lead:', err.message);
        enqueue(payload);
        updateQueueUI();
        setStatus('queued',
          'ðµ No signal â lead queued (' + getQueue().length + ' waiting). Will sync automatically.');
        addToHistory(status, payload, true); // true = queued
        document.getElementById('notes').value = '';
      }

      enableButtons(true);
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // SYNC LOOP  â runs every 60 s, drains the queue when online
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    async function trySyncQueue() {
      var q = getQueue();
      if (q.length === 0) return;

      console.log('[CrispNW] Sync loop: attempting to flush', q.length, 'queued leadsâ¦');

      // Walk backwards so splicing doesn't shift indices
      for (var i = q.length - 1; i >= 0; i--) {
        var payload = q[i];
        try {
          // V10: iframe engine for sync queue too
          await sendDataForm(payload);

          console.log('[CrispNW] Synced queued lead via iframe engine (v10):', payload.timestamp);
          dequeue(i);

        } catch (err) {
          console.warn('[CrispNW] Still offline, lead remains queued:', payload.timestamp);
          break; // No point retrying the rest if we're still offline
        }
      }

      var remaining = getQueue().length;
      updateQueueUI();

      if (remaining === 0) {
        setStatus('success', 'ð Sync complete â all queued leads pushed to Sheet!');
        setTimeout(function() {
          setStatus('idle', 'ð Ready â tap a status button to log this address.');
        }, 3000);
      }
    }

    // Start the 60-second sync loop
    setInterval(trySyncQueue, SYNC_INTERVAL);

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // STATUS BAR
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    function setStatus(type, msg) {
      var bar = document.getElementById('status-bar');
      bar.className = type;
      document.getElementById('status-msg').textContent = msg;
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // SESSION HISTORY LOG
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    function addToHistory(status, payload, isQueued) {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      var list = document.getElementById('history-list');
      var li   = document.createElement('li');

      var badgeClass = isQueued         ? 'badge-queued'
                     : status === 'Interested' ? 'badge-interested'
                     : status === 'Maybe'       ? 'badge-maybe'
                     : 'badge-not';

      var badgeLabel = isQueued ? 'ðµ Queued' : status;

      var coords = payload.lat.toFixed(5) + ', ' + payload.lng.toFixed(5);
      var time   = new Date(payload.timestamp).toLocaleTimeString();

      li.innerHTML =
        '<span class="h-addr">' + coords + '</span>' +
        '<span class="h-meta">' + time + '</span>' +
        '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span>';

      list.insertBefore(li, list.firstChild);
    }

    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    // BOOT
    // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
    initGPS();
    updateQueueUI();          // show any leftover queued leads from a previous session
    trySyncQueue();           // immediately try to flush queue on app open

    // ═══════════════════════════════════════════════════════════════════════
    // SERVICE WORKER REGISTRATION
    // ═══════════════════════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          console.log('[CrispNW] SW registered, scope:', reg.scope);
          // Register Background Sync tag so the SW can wake us when connectivity returns
          if (reg.sync) {
            navigator.serviceWorker.ready.then(function(r) {
              return r.sync.register('crispnw-sync-leads');
            }).catch(function() {});
          }
        }).catch(function(err) {
          console.warn('[CrispNW] SW registration failed:', err);
        });
        // Listen for SW → app messages (e.g. SW_SYNC_LEADS on reconnect)
        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'SW_SYNC_LEADS') trySyncQueue();
        });
      });
    }
  </script>

</body>
