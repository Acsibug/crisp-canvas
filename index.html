<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrispNW Command Center</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --red: #e74c3c;
            --white: #ffffff;
            --gray: #333333;
            --input-bg: #1e1e1e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        h2 { text-align: center; margin: 10px 0; color: #888; font-size: 1.1rem; letter-spacing: 1px; }
        .button-stack { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .btn {
            width: 100%; flex: 1; border: none; border-radius: 12px;
            font-size: 1.6rem; font-weight: 900; color: #000; cursor: pointer;
            transition: transform 0.1s, opacity 0.1s; display: flex; align-items: center; justify-content: center; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.98); opacity: 0.7; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-green { background-color: var(--green); }
        .btn-yellow { background-color: var(--yellow); }
        .btn-red { background-color: var(--red); }
        .btn-white { background-color: var(--white); }
        #notes {
            width: 100%; height: 80px; background: var(--input-bg); border: 2px solid #444; border-radius: 10px;
            color: white; padding: 12px; font-size: 1.1rem; margin-top: 10px; margin-bottom: 5px; resize: none;
        }
        #status-msg { text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 5px; min-height: 45px; display: none; }
    </style>
</head>
<body>
    <h2>CRISPNW COMMAND CENTER</h2>
    <div class="button-stack">
        <button class="btn btn-green" onclick="handleSubmit('Interested')">Interested</button>
        <button class="btn btn-yellow" onclick="handleSubmit('Maybe')">Maybe</button>
        <button class="btn btn-red" onclick="handleSubmit('Not Home')">Not Home</button>
        <button class="btn btn-white" onclick="handleSubmit('Skip')">Skip</button>
    </div>
    <textarea id="notes" placeholder="Notes (Roof moss, gutters, etc...)"></textarea>
    <div id="status-msg"></div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwyAk0L_lKCCElkQs1MTTcq6EWPpI5TC08911W4xLe1nCUyAzulX4p0swUDXVA7dCUp/exec";
        let isSubmitting = false;

        async function handleSubmit(status) {
            if (isSubmitting) return; 
            setLoading(true);
            showStatus("🛰️ Locating...", "#444");
            try {
                const pos = await getCurrentLocation();
                const payload = {
                    timestamp: new Date().toLocaleString(),
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                    status: status,
                    notes: document.getElementById('notes').value
                };
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                showStatus(`✅ ${status} LOGGED`, "var(--green)");
                document.getElementById('notes').value = ""; 
            } catch (error) {
                showStatus("❌ Error: " + error.message, "var(--red)");
            } finally {
                setTimeout(() => {
                    setLoading(false);
                    hideStatus();
                }, 2500);
            }
        }
        function getCurrentLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject(new Error("No GPS"));
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
            });
        }
        function setLoading(state) {
            isSubmitting = state;
            const btns = document.querySelectorAll('.btn');
            btns.forEach(b => b.disabled = state);
        }
        function showStatus(text, color) {
            const msg = document.getElementById('status-msg');
            msg.innerText = text; msg.style.backgroundColor = color; msg.style.display = "block";
        }
        function hideStatus() { document.getElementById('status-msg').style.display = "none"; }
    </script>
</body>
</html>
