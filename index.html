<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CrispNW" />
  <title>CrispNW Canvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 20px 16px 40px;
    }

    header {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-title h1 { font-size: 26px; font-weight: 700; color: #1a73e8; }
    .header-title p  { font-size: 13px; color: #888; margin-top: 2px; }

    #queue-badge {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #ff6d00; color: #fff;
      border-radius: 12px; padding: 6px 12px;
      font-size: 11px; font-weight: 700; line-height: 1.3;
      min-width: 60px; text-align: center;
      box-shadow: 0 2px 8px rgba(255,109,0,0.35);
      animation: fadeIn 0.3s ease;
    }
    #queue-badge.visible { display: flex; }
    #queue-badge .q-count { font-size: 20px; font-weight: 900; line-height: 1; }
    #queue-badge .q-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }

    #sync-indicator {
      display: none;
      width: 100%; max-width: 480px;
      background: #fff3e0; border: 1px solid #ffb74d;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: #e65100;
      margin-bottom: 12px;
      align-items: center; gap: 8px;
    }
    #sync-indicator.visible { display: flex; }
    #sync-indicator .sync-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ff6d00;
      animation: pulse 1.2s infinite; flex-shrink: 0;
    }
    #sync-now-btn {
      margin-left: auto; flex-shrink: 0;
      background: #ff6d00; color: #fff;
      border: none; border-radius: 8px; padding: 5px 10px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      white-space: nowrap;
    }
    #sync-now-btn:active { opacity: 0.75; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px 20px; width: 100%; max-width: 480px; margin-bottom: 20px;
    }
    .card label {
      display: block; font-size: 12px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .card textarea {
      width: 100%; border: 1px solid #ddd; border-radius: 10px;
      padding: 12px; font-size: 15px; resize: vertical; min-height: 80px;
      outline: none; transition: border-color 0.2s; font-family: inherit; color: #333;
    }
    .card textarea:focus { border-color: #1a73e8; }

    .gps-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .gps-dot {
      width: 12px; height: 12px; border-radius: 50%; background: #ccc; flex-shrink: 0;
    }
    .gps-dot.active  { background: #34a853; }
    .gps-dot.pending { background: #fbbc04; animation: pulse 1s infinite; }
    .gps-dot.error   { background: #ea4335; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    .gps-text { font-size: 13px; color: #666; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 4px; }
    .btn {
      border: none; border-radius: 12px; padding: 16px 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn .icon  { font-size: 22px; line-height: 1; }
    .btn .label { font-size: 12px; }
    .btn-interested { background: linear-gradient(135deg, #34a853, #1e7e34); }
    .btn-maybe      { background: linear-gradient(135deg, #fbbc04, #e0a800); color: #333; }
    .btn-not        { background: linear-gradient(135deg, #ea4335, #c62828); }

    #status-bar {
      width: 100%; max-width: 480px; min-height: 44px; border-radius: 12px;
      padding: 10px 16px; font-size: 14px;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.3s, color 0.3s;
    }
    #status-bar.idle    { background: #e8f0fe; color: #1a73e8; }
    #status-bar.loading { background: #fff8e1; color: #f57c00; }
    #status-bar.success { background: #e6f4ea; color: #1e7e34; }
    #status-bar.queued  { background: #fff3e0; color: #e65100; }
    #status-bar.error   { background: #fce8e6; color: #c62828; }

    .history-card { width: 100%; max-width: 480px; margin-top: 20px; }
    .history-card h2 {
      font-size: 14px; font-weight: 700; color: #444;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }
    .history-list { list-style: none; }
    .history-list li {
      background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex; justify-content: space-between; align-items: center; font-size: 14px;
      gap: 8px;
    }
    .h-addr { font-weight: 600; color: #333; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-meta { font-size: 11px; color: #999; white-space: nowrap; }
    .badge { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-interested { background: #e6f4ea; color: #1e7e34; }
    .badge-maybe      { background: #fff8e1; color: #e0a800; }
    .badge-not        { background: #fce8e6; color: #c62828; }
    .badge-queued     { background: #fff3e0; color: #e65100; }
    .empty-state { text-align: center; color: #aaa; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>

  <header>
    <div class="header-title">
      <h1>CrispNW</h1>
      <p>Field Canvas — v7.0 (Blind-Success)</p>
    </div>
    <div id="queue-badge">
      <span class="q-count" id="queue-count">0</span>
      <span class="q-label">Queued</span>
    </div>
  </header>

  <div id="sync-indicator">
    <div class="sync-dot"></div>
    <span id="sync-msg">Waiting for signal to sync queued leads…</span>
    <button id="sync-now-btn" onclick="trySyncQueue()">🔄 Sync Now</button>
  </div>

  <div class="card">
    <label>Notes (optional)</label>
    <textarea id="notes" placeholder="Gate code, dog, call first, referral…"></textarea>
  </div>

  <div class="card">
    <div class="gps-row">
      <div class="gps-dot pending" id="gps-dot"></div>
      <span class="gps-text" id="gps-text">Acquiring GPS…</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-interested" id="btn-interested" onclick="submitLead('Interested')" disabled>
        <span class="icon">✅</span><span class="label">Interested</span>
      </button>
      <button class="btn btn-maybe" id="btn-maybe" onclick="submitLead('Maybe')" disabled>
        <span class="icon">🤔</span><span class="label">Maybe</span>
      </button>
      <button class="btn btn-not" id="btn-not" onclick="submitLead('Not Interested')" disabled>
        <span class="icon">❌</span><span class="label">Not Interested</span>
      </button>
    </div>
  </div>

  <div id="status-bar" class="idle">
    <span id="status-icon">📍</span>
    <span id="status-msg">Waiting for GPS lock…</span>
  </div>

  <div class="history-card">
    <h2>Session Log</h2>
    <ul class="history-list" id="history-list">
      <li class="empty-state" id="empty-state">No leads logged this session.</li>
    </ul>
  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────────────
    var BACKEND_URL   = 'https://script.google.com/macros/s/AKfycbxPBvNlcHPgVMCwXSEzqMKZO9ZerSN87OtWXS00Kkd3nJlxnvHMG-cDsmXdRW2TJTt2/exec';
    var QUEUE_KEY     = 'crispnw_pendingLeads';
    var SYNC_INTERVAL = 60 * 1000;

    var currentLat = null;
    var currentLng = null;

    function initGPS() {
      if (!navigator.geolocation) { setGPS('error', 'GPS not supported.'); return; }
      navigator.geolocation.watchPosition(
        function(pos) {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          setGPS('active', 'GPS locked ±' + Math.round(pos.coords.accuracy) + 'm');
          enableButtons(true);
          setStatus('idle', '📍 Ready — tap a status button to log this address.');
        },
        function(err) {
          setGPS('error', 'GPS error: ' + err.message);
          enableButtons(false);
          setStatus('error', '⚠️ Cannot get location. Check permissions.');
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    }

    function setGPS(state, text) {
      document.getElementById('gps-dot').className = 'gps-dot ' + state;
      document.getElementById('gps-text').textContent = text;
    }

    function enableButtons(on) {
      ['btn-interested','btn-maybe','btn-not'].forEach(function(id) {
        document.getElementById(id).disabled = !on;
      });
    }

    function getQueue() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
      catch (e) { return []; }
    }
    function saveQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    function enqueue(payload) {
      var q = getQueue(); q.push(payload); saveQueue(q);
      console.log('[CrispNW] Queued. Queue size:', q.length);
    }
    function dequeue(index) {
      var q = getQueue(); q.splice(index, 1); saveQueue(q);
    }

    function updateQueueUI() {
      var q     = getQueue();
      var count = q.length;
      document.getElementById('queue-count').textContent = count;
      document.getElementById('queue-badge').classList.toggle('visible', count > 0);
      document.getElementById('sync-indicator').classList.toggle('visible', count > 0);
      if (count > 0) {
        document.getElementById('sync-msg').textContent =
          count + ' lead' + (count > 1 ? 's' : '') + ' queued — tap Sync Now or wait 60s…';
      }
    }

    // ═══ SUBMIT LEAD (Antigravity + Blind-Success)
    async function submitLead(status) {
      if (currentLat === null) {
        setStatus('error', '⚠️ No GPS fix yet. Please wait.');
        return;
      }
      enableButtons(false);
      setStatus('loading', '⏳ Logging lead…');

      var payload = {
        timestamp : new Date().toISOString(),
        lat       : currentLat,
        lng       : currentLng,
        status    : status,
        notes     : document.getElementById('notes').value.trim()
      };

      try {
        var controller = new AbortController();
        var timeoutId  = setTimeout(function() { controller.abort(); }, 8000);

        // mode:no-cors returns an opaque response (status 0).
        // If fetch() resolves without throwing, the request reached Google's servers.
        await fetch(BACKEND_URL, {
          method : 'POST',
          mode   : 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body   : JSON.stringify(payload),
          signal : controller.signal
        });

        clearTimeout(timeoutId);
        console.log('[CrispNW] Sent (blind-success):', status, payload.lat, payload.lng);
        setStatus('success', '✅ "' + status + '" logged! Check your Sheet.');
        addToHistory(status, payload, false);
        document.getElementById('notes').value = '';

      } catch (err) {
        console.warn('[CrispNW] POST failed, queuing:', err.message);
        enqueue(payload);
        updateQueueUI();
        setStatus('queued', '📵 No signal — lead queued (' + getQueue().length + ' pending). Tap 🔄 Sync Now when back in range.');
        addToHistory(status, payload, true);
        document.getElementById('notes').value = '';
      }

      enableButtons(true);
    }

    // ═══ SYNC QUEUE — blind-success drain
    async function trySyncQueue() {
      var q = getQueue();
      if (q.length === 0) return;

      console.log('[CrispNW] Syncing', q.length, 'queued leads…');
      setStatus('loading', '🔄 Syncing ' + q.length + ' queued lead' + (q.length > 1 ? 's' : '') + '…');

      for (var i = q.length - 1; i >= 0; i--) {
        var payload = q[i];
        try {
          var controller = new AbortController();
          var tid = setTimeout(function() { controller.abort(); }, 8000);

          await fetch(BACKEND_URL, {
            method : 'POST',
            mode   : 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body   : JSON.stringify(payload),
            signal : controller.signal
          });

          clearTimeout(tid);
          console.log('[CrispNW] Synced (blind-success):', payload.timestamp);
          dequeue(i);

        } catch (err) {
          console.warn('[CrispNW] Still offline:', err.message);
          break;
        }
      }

      var remaining = getQueue().length;
      updateQueueUI();

      if (remaining === 0) {
        setStatus('success', '🔄 Sync complete — all leads pushed to Sheet!');
        setTimeout(function() {
          setStatus('idle', '📍 Ready — tap a status button to log this address.');
        }, 3000);
      } else {
        setStatus('queued', '📵 Still offline — ' + remaining + ' lead' + (remaining > 1 ? 's' : '') + ' queued. Retry when in range.');
      }
    }

    setInterval(trySyncQueue, SYNC_INTERVAL);

    function setStatus(type, msg) {
      document.getElementById('status-bar').className = type;
      document.getElementById('status-msg').textContent = msg;
    }

    function addToHistory(status, payload, isQueued) {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      var list = document.getElementById('history-list');
      var li   = document.createElement('li');
      var badgeClass = isQueued ? 'badge-queued'
                     : status === 'Interested' ? 'badge-interested'
                     : status === 'Maybe'       ? 'badge-maybe'
                     : 'badge-not';
      var badgeLabel = isQueued ? '📵 Queued' : status;
      var coords = payload.lat.toFixed(5) + ', ' + payload.lng.toFixed(5);
      var time   = new Date(payload.timestamp).toLocaleTimeString();
      li.innerHTML =
        '<span class="h-addr">' + coords + '</span>' +
        '<span class="h-meta">' + time + '</span>' +
        '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span>';
      list.insertBefore(li, list.firstChild);
    }

    initGPS();
    updateQueueUI();
    trySyncQueue();
  </script>

</body>
</html>
